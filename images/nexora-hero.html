<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .scene {
      width: 100%;
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    .orb1 { width: 320px; height: 320px; background: rgba(255,120,0,0.18); top: -80px; left: -60px; }
    .orb2 { width: 280px; height: 280px; background: rgba(255,60,0,0.12); bottom: -60px; right: -40px; animation-delay: -3s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 52px 64px;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,140,0,0.08), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
      max-width: 580px;
      width: 90%;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    /* Badge */
    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,140,0,0.15);
      border: 1px solid rgba(255,140,0,0.35);
      color: #ffb347;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      animation: fadeUp 0.8s 0.3s both;
    }

    /* Heading */
    h2 {
      color: #fff;
      font-size: 3rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      animation: fadeUp 0.8s 0.5s both;
    }
    h2 span {
      background: linear-gradient(90deg, #ff8c00, #ffcf6b, #ff6a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Paragraph */
    p {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.7;
      margin: 0 auto 32px;
      animation: fadeUp 0.8s 0.7s both;
    }

    /* Buttons */
    .btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      animation: fadeUp 0.8s 0.9s both;
    }

    .btn-primary {
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ff8c00, #ff5500);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,100,0,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,100,0,0.55);
    }

    .btn-ghost {
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.85);
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-2px);
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-top: 36px;
      animation: fadeUp 0.8s 1.1s both;
    }
    .stat { text-align: center; }
    .stat-num { color: #fff; font-size: 1.4rem; font-weight: 800; }
    .stat-num span { color: #ff9f2f; }
    .stat-lbl {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card { padding: 36px 28px; }
      h2 { font-size: 2rem; }
      .btns { flex-direction: column; align-items: center; }
      .stats { gap: 20px; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <canvas id="c"></canvas>
    <div class="card">
      <div class="badge">✦ Launching Soon</div>
      <h2>Build Faster<br>with <span>Nexora</span></h2>
      <p>The modern SaaS platform that streamlines your workflow, scales with your team, and ships with you.</p>
      <div class="btns">
        <button class="btn-primary">Get Early Access</button>
        <button class="btn-ghost">Watch Demo →</button>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num"><span>12K</span>+</div>
          <div class="stat-lbl">Users</div>
        </div>
        <div class="stat">
          <div class="stat-num"><span>99</span>%</div>
          <div class="stat-lbl">Uptime</div>
        </div>
        <div class="stat">
          <div class="stat-num"><span>4.9</span>★</div>
          <div class="stat-lbl">Rating</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const scene  = document.getElementById('scene');
    let W, H, particles = [], lines = [];
    const COLORS = [
      'rgba(255,140,0,',
      'rgba(255,80,0,',
      'rgba(255,200,80,',
      'rgba(200,100,0,'
    ];

    function resize() {
      W = canvas.width  = scene.offsetWidth;
      H = canvas.height = scene.offsetHeight;
    }

    /* ---- Particle ---- */
    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x       = Math.random() * W;
        this.y       = init ? Math.random() * H : (Math.random() < 0.5 ? -5 : H + 5);
        this.r       = 0.8 + Math.random() * 2.2;
        this.vx      = (Math.random() - 0.5) * 0.4;
        this.vy      = -0.15 - Math.random() * 0.5;
        this.alpha   = 0.3 + Math.random() * 0.6;
        this.col     = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.life    = 0;
        this.maxLife = 200 + Math.random() * 300;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        if (this.life > this.maxLife || this.y < -10) this.reset(false);
      }
      draw() {
        const a = this.alpha * (1 - Math.pow(this.life / this.maxLife, 2));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.col + a + ')';
        ctx.fill();
      }
    }

    /* ---- Light streak ---- */
    class LightLine {
      constructor() { this.reset(); }
      reset() {
        this.x      = Math.random() * W;
        this.y      = H + 20;
        this.len    = 40 + Math.random() * 120;
        this.speed  = 0.8 + Math.random() * 2;
        this.alpha  = 0.05 + Math.random() * 0.15;
        this.width  = 0.5 + Math.random() * 1.5;
        this.col    = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.active = Math.random() > 0.6;
      }
      update() {
        if (!this.active) return;
        this.y -= this.speed;
        if (this.y + this.len < 0) this.reset();
      }
      draw() {
        if (!this.active) return;
        const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y - this.len);
        grad.addColorStop(0,   this.col + '0)');
        grad.addColorStop(0.5, this.col + this.alpha + ')');
        grad.addColorStop(1,   this.col + '0)');
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y - this.len);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = this.width;
        ctx.stroke();
      }
    }

    function init() {
      resize();
      particles = Array.from({ length: 120 }, () => new Particle());
      lines     = Array.from({ length: 30  }, () => new LightLine());
    }

    function loop() {
      requestAnimationFrame(loop);
      ctx.clearRect(0, 0, W, H);

      /* vignette */
      const vg = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.8);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.6)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);

      lines.forEach(l => { l.update(); l.draw(); });
      particles.forEach(p => { p.update(); p.draw(); });

      /* mesh lines between nearby particles */
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < 80) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255,140,0,${0.04 * (1 - d/80)})`;
            ctx.lineWidth   = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    window.addEventListener('resize', resize);
    init();
    loop();
  </script>
</body>
</html>
